services:
  postgres:
    image: postgres:16-alpine
    container_name: alwisam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alwisam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alwisam_secure_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-alwisam_dental}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alwisam} -d ${POSTGRES_DB:-alwisam_dental}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: alwisam-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alwisam-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alwisam}:${POSTGRES_PASSWORD:-alwisam_secure_change_me}@postgres:5432/${POSTGRES_DB:-alwisam_dental}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      UPLOAD_DIR: /app/uploads
      SIGNED_URL_SECRET: ${SIGNED_URL_SECRET}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
