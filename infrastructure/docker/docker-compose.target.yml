# Target stack only — keep root docker-compose.yml (legacy postgres/redis) unchanged.
#
# Production note: do not publish MongoDB ports publicly. The host bind below
# (27017) is for local development only; remove or firewall it in prod.

services:
  mongodb:
    image: mongo:7
    container_name: alwisam-target-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-alwisam}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-alwisam_mongo_change_me}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-alwisam}
    # Local only — remove ports in production.
    # Host 27018 avoids clash with other local MongoDB stacks on 27017.
    ports:
      - "27018:27017"
    volumes:
      - mongodb_target_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "${MONGO_ROOT_USER:-alwisam}",
          "-p",
          "${MONGO_ROOT_PASSWORD:-alwisam_mongo_change_me}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: alwisam-target-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-4000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://alwisam:alwisam_mongo_change_me@mongodb:27017/alwisam?authSource=admin}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      # Default host 4001 avoids clash with other local APIs on 4000.
      - "${API_PORT:-4001}:4000"
    depends_on:
      mongodb:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: alwisam-target-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      # Default host 3003 avoids clash with other local Next apps on 3000/3001.
      - "${WEB_PORT:-3004}:3001"
    depends_on:
      - api

volumes:
  mongodb_target_data:
